name: ci-owned

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-owned-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
  COREPACK_HOME: /home/runner/.cache/open-design-ci/corepack
  OPEN_DESIGN_CI_OWNED_ROOT: /home/runner/.cache/open-design-ci/workflows/ci-owned
  OPEN_DESIGN_CI_RUNNER_CACHE_ROOT: /home/runner/.cache/open-design-ci
  npm_config_fetch_retries: "6"
  npm_config_fetch_retry_maxtimeout: "120000"
  npm_config_fetch_retry_mintimeout: "20000"
  npm_config_network_timeout: "180000"
  npm_config_store_dir: /home/runner/.cache/open-design-ci/pnpm-store
  OD_CI_PNPM_INSTALL_MODE: offline

jobs:
  prepare-workspace:
    name: Owned CI / prepare workspace
    runs-on: [self-hosted, Linux, ARM64, nexu-spark, open-design-ci]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Publish prepared workspace
        run: |
          set -euo pipefail
          shared_run_root="$OPEN_DESIGN_CI_OWNED_ROOT/$GITHUB_RUN_ID"
          shared_workspace="$shared_run_root/workspace"
          rm -rf "$shared_run_root"
          mkdir -p "$shared_workspace"
          tar -C "$GITHUB_WORKSPACE" -cf - . | tar -C "$shared_workspace" -xf -
          pnpm -C "$shared_workspace" tools-ci validate-atoms --manifest "$shared_workspace/tools/ci/atoms.json"

  shard:
    name: Owned CI / ${{ matrix.shard }}
    needs: prepare-workspace
    runs-on: [self-hosted, Linux, ARM64, nexu-spark, open-design-ci]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - shard: nix
            profile: nix-capable
            atoms: nix
          - shard: build-typecheck
            profile: ci-base
            atoms: typecheck build
          - shard: checks-web
            profile: ci-base
            atoms: guard i18n unit web
    env:
      CI_GATE_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Run owned CI shard
        working-directory: ${{ env.OPEN_DESIGN_CI_OWNED_ROOT }}/${{ github.run_id }}/workspace
        run: OPEN_DESIGN_CI_EVIDENCE_ROOT="$OPEN_DESIGN_CI_OWNED_ROOT/$GITHUB_RUN_ID/evidence" .github/workflows/scripts/ci/local-docker-tools-ci.sh --provider owned --profile "${{ matrix.profile }}" "${GITHUB_RUN_ID}-${{ matrix.shard }}" ${{ matrix.atoms }}

  merge:
    name: Owned CI / merge
    needs: [prepare-workspace, shard]
    if: ${{ always() }}
    runs-on: [self-hosted, Linux, ARM64, nexu-spark, open-design-ci]
    timeout-minutes: 20
    env:
      CI_GATE_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Merge owned CI shard results
        working-directory: ${{ env.OPEN_DESIGN_CI_OWNED_ROOT }}/${{ github.run_id }}/workspace
        run: |
          set -euo pipefail
          out_dir="$OPEN_DESIGN_CI_OWNED_ROOT/$GITHUB_RUN_ID/evidence/runs/${GITHUB_RUN_ID}"
          mkdir -p "$out_dir"
          pnpm tools-ci merge-shards \
            --manifest tools/ci/atoms.json \
            --shards-root "$OPEN_DESIGN_CI_OWNED_ROOT/$GITHUB_RUN_ID/evidence/runs" \
            --provider owned \
            --mode default \
            --event-name "$GITHUB_EVENT_NAME" \
            --head-sha "$CI_GATE_HEAD_SHA" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --out "$out_dir/ci-results.json"
          echo "ci results: $out_dir/ci-results.json"
          echo "OD_CI_RESULTS_JSON $(base64 < "$out_dir/ci-results.json" | tr -d '\n')"

      - name: Upload owned CI results
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: ci-results-owned
          path: ${{ env.OPEN_DESIGN_CI_OWNED_ROOT }}/${{ github.run_id }}/evidence/runs/${{ github.run_id }}
          if-no-files-found: error
          retention-days: 7
